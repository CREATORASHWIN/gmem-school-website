<header class="fixed inset-x-0 top-0 z-50 border-b border-slate-200 bg-white/95 shadow-sm backdrop-blur-xl">
  <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
    <a
      routerLink="/"
      class="flex min-w-0 items-center gap-3 text-left"
      aria-label="Go to home"
      (click)="closeMenu()"
    >
      <span class="grid h-12 w-12 shrink-0 place-items-center rounded-md bg-blue-700 text-sm font-black text-white shadow-lg shadow-blue-900/20">
        GM
      </span>
      <span class="min-w-0">
        <span class="block text-sm font-black uppercase leading-tight tracking-wide text-slate-950 sm:text-base">
          Gandhi Memorial
        </span>
        <span class="block text-xs font-semibold uppercase tracking-wider text-slate-500">
          English High School
        </span>
      </span>
    </a>

    <nav class="hidden items-center gap-1 lg:flex" aria-label="Primary navigation">
      <ng-container *ngFor="let item of navItems">
        <a
          *ngIf="item.path === '/'; else desktopNewTabLink"
          [routerLink]="item.path"
          routerLinkActive="bg-blue-50 text-blue-700"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded-md px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-blue-50 hover:text-blue-700"
        >
          {{ item.label }}
        </a>

        <ng-template #desktopNewTabLink>
          <a
            [href]="item.path"
            target="_blank"
            rel="noopener noreferrer"
            class="rounded-md px-3 py-2 text-sm font-semibold text-slate-700 transition hover:bg-blue-50 hover:text-blue-700"
          >
            {{ item.label }}
          </a>
        </ng-template>
      </ng-container>
    </nav>

    <a
      routerLink="/contact"
      class="hidden rounded-md bg-blue-700 px-5 py-3 text-sm font-bold text-white shadow-lg shadow-blue-900/20 transition hover:bg-blue-800 md:inline-flex"
    >
      Admissions Enquiry
    </a>

    <button
      type="button"
      class="grid h-11 w-11 place-items-center rounded-md border border-slate-200 text-slate-800 lg:hidden"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen"
      aria-label="Toggle navigation"
    >
      <svg *ngIf="!menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7h16M4 12h16M4 17h16"/>
      </svg>
      <svg *ngIf="menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18 18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <nav *ngIf="menuOpen" class="border-t border-slate-100 bg-white px-4 py-3 shadow-xl lg:hidden" aria-label="Mobile navigation">
    <ng-container *ngFor="let item of navItems">
      <a
        *ngIf="item.path === '/'; else mobileNewTabLink"
        [routerLink]="item.path"
        routerLinkActive="bg-blue-50 text-blue-700"
        [routerLinkActiveOptions]="{ exact: true }"
        class="block w-full rounded-md px-3 py-3 text-left text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700"
        (click)="closeMenu()"
      >
        {{ item.label }}
      </a>

      <ng-template #mobileNewTabLink>
        <a
          [href]="item.path"
          target="_blank"
          rel="noopener noreferrer"
          class="block w-full rounded-md px-3 py-3 text-left text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700"
          (click)="closeMenu()"
        >
          {{ item.label }}
        </a>
      </ng-template>
    </ng-container>
  </nav>
</header>
