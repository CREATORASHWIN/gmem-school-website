<section id="contact" class="py-20 bg-gradient-to-b from-white to-gray-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="text-4xl font-extrabold text-gray-900 mb-12 text-center tracking-wide">
      Contact Us
    </h2>

    <!-- Email -->
    <div class="text-center mb-12">
      <p class="text-gray-700 text-lg">
        Email: 
        <a href="mailto:{{ email }}" class="text-blue-600 hover:text-blue-800 transition-colors duration-300 underline">
          {{ email }}
        </a>
      </p>
    </div>

    <!-- Addresses and Maps -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div 
        *ngFor="let addr of addresses" 
        class="bg-white rounded-xl shadow-lg p-6 text-center transform transition-transform duration-300 hover:-translate-y-2 hover:shadow-2xl"
      >
        <h3 class="text-2xl font-semibold text-gray-800 mb-2">{{ addr.type }}</h3>
        <p class="text-gray-700 mb-4">{{ addr.address }}</p>
        <div class="aspect-w-16 aspect-h-9 rounded-lg overflow-hidden shadow-inner">
          <iframe
            [src]="addr.mapUrl"
            width="100%"
            height="200"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            class="rounded-lg transition-transform duration-300 hover:scale-105">
          </iframe>
        </div>
      </div>
    </div>
  </div>
</section>
