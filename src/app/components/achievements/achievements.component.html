<section id="achievements" class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h2 class="text-3xl font-extrabold text-gray-900 mb-12">Our Achievements</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div *ngFor="let achievement of achievements" class="bg-gray-50 rounded-lg shadow-md p-6 hover:shadow-xl transition duration-300">
        <h3 class="text-xl font-semibold text-gray-800 mb-2">{{ achievement.title }}</h3>
        <p class="text-gray-700 mb-2">{{ achievement.description }}</p>
        <p class="text-sm text-gray-500">{{ achievement.date }}</p>
      </div>
    </div>
  </div>
</section>
