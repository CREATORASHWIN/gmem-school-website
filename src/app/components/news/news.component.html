<section id="news" class="scroll-mt-24 bg-white py-20 sm:py-24">
  <div class="mx-auto grid max-w-7xl gap-10 px-4 sm:px-6 lg:grid-cols-[0.9fr_1.1fr] lg:px-8">
    <div>
      <p class="section-kicker">School updates</p>
      <h2 class="mt-3 text-3xl font-black leading-tight text-slate-950 sm:text-5xl">
        News parents and students should not miss.
      </h2>
      <p class="mt-5 text-lg leading-8 text-slate-600">
        Follow school announcements, admissions information, competitions, celebrations and learning highlights.
      </p>
      <div class="mt-8 rounded-md bg-blue-50 p-6 ring-1 ring-blue-100">
        <p class="text-sm font-bold uppercase tracking-wider text-blue-700">Notice board</p>
        <p class="mt-2 text-2xl font-black text-slate-950">Keep checking for new circulars and event dates.</p>
      </div>
    </div>

    <div class="grid gap-4">
      <article *ngFor="let news of newsItems" class="rounded-md border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-1 hover:shadow-xl">
        <p class="text-sm font-bold uppercase tracking-wider text-blue-700">{{ news.date }}</p>
        <h3 class="mt-3 text-2xl font-black text-slate-950">{{ news.title }}</h3>
        <p class="mt-3 leading-7 text-slate-600">{{ news.description }}</p>
      </article>
    </div>
  </div>
</section>
