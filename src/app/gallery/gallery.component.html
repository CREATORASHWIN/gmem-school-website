<section id="gallery" class="scroll-mt-24 bg-slate-50 py-20 sm:py-24">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl">
      <p class="section-kicker">Campus life</p>
      <h2 class="mt-3 text-3xl font-black leading-tight text-slate-950 sm:text-5xl">
        A glimpse of learning, events and everyday school energy.
      </h2>
    </div>

    <div class="mt-12 grid auto-rows-[220px] grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-4">
      <figure
        *ngFor="let image of images; let i = index"
        class="group relative overflow-hidden rounded-md bg-slate-200 shadow-sm"
        [ngClass]="{
          'sm:col-span-2': i === 0 || i === 5,
          'lg:row-span-2': i === 0
        }"
      >
        <img [src]="'/' + image" alt="School gallery photo" class="h-full w-full object-cover transition duration-500 group-hover:scale-105" />
        <figcaption class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-slate-950/80 to-transparent p-4 text-sm font-bold text-white">
          {{ captions[i] }}
        </figcaption>
      </figure>
    </div>
  </div>
</section>
