<header class="fixed w-full bg-white shadow-md z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <!-- Logo / School Name -->
    <div
      class="text-xl md:text-2xl font-bold text-gray-800 cursor-pointer hover:text-blue-600 transition-colors duration-300"
      (click)="scrollTo('hero')"
    >
      GANDHI MEMORIAL ENGLISH HIGH SCHOOL
    </div>

    <!-- Navigation (Desktop) -->
    <nav class="hidden md:flex space-x-6">
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('hero')">Home</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('about')">About</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('gallery')">Gallery</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('news')">News</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('achievements')">Achievements</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('events')">Events</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('contact')">Contact</a>
    </nav>

    <!-- Mobile Menu Button -->
    <div class="md:hidden">
      <button (click)="toggleMenu()" class="focus:outline-none">
        <svg *ngIf="!menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg *ngIf="menuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
             viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="menuOpen" class="md:hidden bg-white shadow-md">
    <nav class="flex flex-col space-y-2 p-4">
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('hero')">Home</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('about')">About</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('gallery')">Gallery</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('news')">News</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('achievements')">Achievements</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('events')">Events</a>
      <a class="text-gray-700 hover:text-blue-600 cursor-pointer" (click)="scrollTo('contact')">Contact</a>
    </nav>
  </div>
</header>
