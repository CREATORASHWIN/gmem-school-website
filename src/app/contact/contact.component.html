<section id="contact" class="scroll-mt-24 bg-white py-20 sm:py-24">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="grid gap-10 lg:grid-cols-[0.8fr_1.2fr]">
      <div>
        <p class="section-kicker">Contact</p>
        <h2 class="mt-3 text-3xl font-black leading-tight text-slate-950 sm:text-5xl">
          Speak with Gandhi Memorial English High School.
        </h2>
        <p class="mt-5 text-lg leading-8 text-slate-600">
          For admissions, school visits, certificates or general enquiries, contact the office by email or visit the nearest campus.
        </p>

        <div class="mt-8 rounded-md bg-blue-50 p-6 ring-1 ring-blue-100">
          <p class="text-sm font-bold uppercase tracking-wider text-blue-700">Email</p>
          <a href="mailto:{{ email }}" class="mt-2 block break-words text-2xl font-black text-slate-950 hover:text-blue-700">
            {{ email }}
          </a>
        </div>
      </div>

      <div class="grid gap-5">
        <article *ngFor="let addr of addresses" class="overflow-hidden rounded-md border border-slate-200 bg-white shadow-sm">
          <div class="p-6">
            <p class="text-sm font-bold uppercase tracking-wider text-blue-700">{{ addr.type }}</p>
            <h3 class="mt-2 text-xl font-black text-slate-950">{{ addr.address }}</h3>
          </div>
          <iframe
            [src]="addr.mapUrl"
            width="100%"
            height="220"
            style="border:0;"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="{{ addr.type }} map">
          </iframe>
        </article>
      </div>
    </div>
  </div>
</section>
