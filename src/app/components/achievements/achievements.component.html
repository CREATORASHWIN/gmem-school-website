<section id="achievements" class="scroll-mt-24 bg-slate-950 py-20 text-white sm:py-24">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col justify-between gap-6 md:flex-row md:items-end">
      <div class="max-w-2xl">
        <p class="text-sm font-bold uppercase tracking-wider text-blue-200">Achievements</p>
        <h2 class="mt-3 text-3xl font-black leading-tight sm:text-5xl">
          Growth that shows up in classrooms, competitions and confidence.
        </h2>
      </div>
      <p class="max-w-md leading-7 text-slate-300">
        The school encourages students to participate, improve and represent their learning with pride.
      </p>
    </div>

    <div class="mt-12 grid gap-5 md:grid-cols-3">
      <article *ngFor="let achievement of achievements" class="rounded-md border border-white/10 bg-white/10 p-6 backdrop-blur transition hover:-translate-y-1 hover:bg-white/15">
        <p class="text-sm font-bold uppercase tracking-wider text-blue-200">{{ achievement.date }}</p>
        <h3 class="mt-4 text-2xl font-black">{{ achievement.title }}</h3>
        <p class="mt-4 leading-7 text-slate-300">{{ achievement.description }}</p>
      </article>
    </div>
  </div>
</section>
