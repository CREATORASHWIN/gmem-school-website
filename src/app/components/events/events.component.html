<section id="events" class="scroll-mt-24 bg-slate-50 py-20 sm:py-24">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl">
      <p class="section-kicker">Events calendar</p>
      <h2 class="mt-3 text-3xl font-black leading-tight text-slate-950 sm:text-5xl">
        Activities that make school memorable.
      </h2>
    </div>

    <div class="mt-12 grid gap-5 md:grid-cols-3">
      <article *ngFor="let event of events; let i = index" class="rounded-md bg-white p-6 shadow-sm ring-1 ring-slate-200 transition hover:-translate-y-1 hover:shadow-xl">
        <div class="grid h-12 w-12 place-items-center rounded-md bg-blue-700 text-lg font-black text-white">
          {{ i + 1 }}
        </div>
        <p class="mt-6 text-sm font-bold uppercase tracking-wider text-blue-700">{{ event.date }}</p>
        <h3 class="mt-3 text-2xl font-black text-slate-950">{{ event.title }}</h3>
        <p class="mt-3 leading-7 text-slate-600">{{ event.description }}</p>
      </article>
    </div>
  </div>
</section>
