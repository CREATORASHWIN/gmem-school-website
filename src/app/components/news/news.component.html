<section id="news" class="py-20 bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row">

    <!-- Left Main Content -->
    <div class="md:w-3/4 mb-8 md:mb-0">
      <h2 class="text-3xl font-extrabold text-gray-900 mb-6">Welcome to Gandhi Memorial News</h2>
      <p class="text-gray-700 mb-6">
        Stay updated with the latest happenings, events, and announcements from our school.
      </p>
    </div>

    <!-- Right Side News Ticker -->
    <div class="md:w-1/4 md:ml-8">
      <h3 class="text-xl font-semibold text-gray-800 mb-4">Latest News</h3>
      <div class="overflow-hidden h-64 relative">
        <ul
          class="flex flex-col animate-[scroll_15s_linear_infinite]"
          style="@keyframes scroll {0% {transform: translateY(0);} 100% {transform: translateY(-100%);}}"
        >
          <li *ngFor="let news of newsItems" class="mb-6">
            <p class="font-semibold text-gray-900">{{ news.title }}</p>
            <p class="text-sm text-gray-500">{{ news.date }}</p>
            <p class="text-gray-700 text-sm">{{ news.description }}</p>
          </li>
        </ul>
      </div>
    </div>

  </div>
</section>
